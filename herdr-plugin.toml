#
# herdr-helpr — a collection of helpful herdr tools
#
id = "herdr-helpr"
name = "Herdr Helpr"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "A swiss-army knife of herdr helpers: create named workspaces, close other tabs/panes, rename workspaces interactively, and more."
platforms = ["linux", "macos"]

# Build: install npm dependencies
[[build]]
command = ["bun", "install"]

# ── Actions (background — open overlay pane) ─────────

[[actions]]
id = "new-workspace"
title = "New Workspace (with name prompt)"
command = ["bun", "run", "src/actions.ts", "new-workspace"]

[[actions]]
id = "rename-workspace"
title = "Rename Workspace (with name prompt)"
command = ["bun", "run", "src/actions.ts", "rename-workspace"]

[[actions]]
id = "close-other-tabs"
title = "Close Other Tabs"
command = ["bun", "run", "src/actions.ts", "close-other-tabs"]

[[actions]]
id = "close-other-panes"
title = "Close Other Panes"
command = ["bun", "run", "src/actions.ts", "close-other-panes"]

# ── Panes (interactive Ink TUI overlays) ──────────────

[[panes]]
id = "prompt-new-workspace"
title = "New Workspace"
placement = "overlay"
command = ["bun", "run", "src/index.tsx", "prompt-new-workspace"]

[[panes]]
id = "prompt-rename-workspace"
title = "Rename Workspace"
placement = "overlay"
command = ["bun", "run", "src/index.tsx", "prompt-rename-workspace"]

[[panes]]
id = "prompt-close-other-tabs"
title = "Close Other Tabs"
placement = "overlay"
command = ["bun", "run", "src/index.tsx", "close-other-tabs"]

[[panes]]
id = "prompt-close-other-panes"
title = "Close Other Panes"
placement = "overlay"
command = ["bun", "run", "src/index.tsx", "close-other-panes"]
